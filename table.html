<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>演習：表の作成</title>
    <style>
        /* 表を見やすくするための簡単なデザイン */
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>

    <h1>作成した表</h1>
    
    <table>
        <tr>
            <th>見出し1（例：曜日）</th>
            <th>見出し2（例：科目名）</th>
            <th>見出し3（例：教室）</th>
        </tr>
        <tr>
            <td>月曜日</td>
            <td>情報リテラシー</td>
            <td>101教室</td>
        </tr>
        <tr>
            <td>火曜日</td>
            <td>プログラミング基礎</td>
            <td>202教室</td>
        </tr>
    </table>
    </body>
</html>
